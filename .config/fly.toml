# fly.toml app configuration file for git-ents-hosted.
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# `git-ents-server` (no `-c` needed, its own separate app) is the legacy
# pre-redo deployment, left alone. This app is the single-node hosted root
# (`roots.single-node-hosted`, phase 6), a dedicated app so its shared
# anycast proxy never round-robins traffic onto legacy's stopped machine.

app = 'git-ents-hosted'
primary_region = 'iad'

[build]
  # The single-node hosted root (`roots.single-node-hosted`, phase 6):
  # `git-ents` itself, served behind stock git's smart-HTTP transport.
  dockerfile = "../Dockerfile"

[env]
  PORT = '8080'
  # The canonical host sign-in challenges bind to (`roots.web-signin`);
  # the entrypoint passes it to `git ents serve --hosted --public-host`.
  PUBLIC_HOST = 'git.ents.cloud'

[mounts]
  source = 'git_ents_hosted'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  # Suspend, not stop: web sessions and sign-in challenges are memory-only
  # by spec (`roots.web-session`), and suspend preserves RAM across idle
  # periods — a deploy or crash still drops them, which the spec accepts.
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
