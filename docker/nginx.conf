worker_processes 1;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log /dev/stderr;

    server {
        listen 8080;

        location / {
            # git push can be large; never buffer it into a temp file.
            client_max_body_size 0;
            gzip off;

            include /etc/nginx/fastcgi_params;
            fastcgi_pass unix:/run/fcgiwrap.sock;
            fastcgi_param SCRIPT_FILENAME /usr/lib/git-core/git-http-backend;
            fastcgi_param GIT_HTTP_EXPORT_ALL "";
            fastcgi_param GIT_PROJECT_ROOT /data;
            fastcgi_param PATH_INFO $uri;
            # git-http-backend spawns receive-pack, which runs our hooks,
            # which shell to the sprite CLI (`ents-effect`'s
            # `SpriteExecutor`) — fcgiwrap otherwise hands CGI processes a
            # minimal environment with no PATH at all.
            fastcgi_param PATH "/usr/local/bin:/usr/bin:/bin";
        }
    }
}
